name: Build and Deploy Frontend to GKE
on:
  push:
    branches: [ "main" ]
permissions:
  contents: read
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
      GKE_ZONE: ${{ vars.GKE_ZONE }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
      DEPLOYMENT_NAME: ${{ vars.DEPLOYMENT_NAME }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}
      - run: |
          kubectl -n ${K8S_NAMESPACE} set image deployment/${DEPLOYMENT_NAME}             ${DEPLOYMENT_NAME}=${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}
      - run: |
          kubectl -n ${K8S_NAMESPACE} annotate deployment/${DEPLOYMENT_NAME}             kubernetes.io/change-cause="Deploy: ${{ github.event.head_commit.message }}"             --overwrite
      - run: kubectl -n ${K8S_NAMESPACE} rollout status deployment/${DEPLOYMENT_NAME}
